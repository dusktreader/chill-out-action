extends: default

rules:
  # action.yml uses long description strings
  line-length:
    max: 130
    level: warning

  # Allow both "on" and "true"/"false" as booleans
  truthy:
    allowed-values: ["true", "false", "on"]

  # Require exactly one space after comment marker
  comments:
    min-spaces-from-content: 1

  # action.yml and workflow files don't need a document-start marker
  document-start: disable
