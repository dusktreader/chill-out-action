name: Test

on:
  push:
  pull_request:

jobs:
  test-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          command: check

  test-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          command: fix
          github-token: ${{ secrets.GITHUB_TOKEN }}
